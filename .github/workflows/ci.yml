name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Cache DITA-OT
        uses: actions/cache@v4
        with:
          path: build/dita-ot
          key: dita-ot-${{ hashFiles('build.gradle.kts') }}

      - name: Download DITA-OT
        run: ./gradlew downloadDitaOt

      - name: Run XSLT Unit Tests
        run: ./gradlew xsltUnitTest

      - name: Install Mindmap Plugin
        run: ./gradlew installMindmapPlugin

      - name: Run Integration Tests
        run: ./gradlew integrationTest

      - name: Build Distribution ZIP
        run: ./gradlew distPlugin

      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: |
            build/output/
            build/test-output/
          retention-days: 7

      - name: Upload distribution ZIP
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dist
          path: build/dist/*.zip
          retention-days: 30
