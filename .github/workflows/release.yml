name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download DITA-OT
        run: ./gradlew downloadDitaOt

      - name: Run XSLT Unit Tests
        run: ./gradlew xsltUnitTest

      - name: Install Plugin and Run Integration Tests
        run: ./gradlew integrationTest

      - name: Build Distribution ZIP
        run: ./gradlew distPlugin -PpluginVersion=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/*.zip
          generate_release_notes: true
          body: |
            ## DITA-OT Mindmap Plugin v${{ steps.version.outputs.VERSION }}

            ### Installation

            ```bash
            dita install https://github.com/jyjeanne/dita-to-mindmap/releases/download/v${{ steps.version.outputs.VERSION }}/com.github.jyjeanne.mindmap-${{ steps.version.outputs.VERSION }}.zip
            ```

            ### Transtypes
            - `mindmap-html` — Interactive HTML mindmap (jsMind)
            - `mindmap-pdf` — PDF with SVG tree diagram
            - `mindmap-svg` — Standalone SVG diagram
