<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindmap Documentation Produit X</title>
  <link type="text/css" rel="stylesheet" href="//cdn.jsdelivr.net/npm/jsmind@0.9.1/style/jsmind.css"/>
  <script type="text/javascript" src="//cdn.jsdelivr.net/npm/jsmind@0.9.1/es6/jsmind.js"></script>
  <script type="text/javascript" src="//cdn.jsdelivr.net/npm/jsmind@0.9.1/es6/jsmind.draggable.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1f77b4;
      color: #fff;
    }
    header h1 { font-size: 1.2rem; }
    header button {
      padding: 6px 16px;
      border: 1px solid #fff;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    header button:hover { background: rgba(255,255,255,0.15); }
    #jsmind_container {
      width: 100%;
      height: calc(100vh - 50px);
    }
  </style>
</head>
<body>

<header>
  <h1>Mindmap - Documentation Produit X</h1>
  <button onclick="window.print()">Exporter PDF</button>
</header>

<div id="jsmind_container"></div>

<script type="text/javascript">
  var mind = {
    "meta": {"name": "Documentation Produit X"},
    "format": "node_tree",
    "data": {
      "id": "root",
      "topic": "Documentation Produit X",
      "expanded": true,
      "children": [
        {
          "id": "introduction",
          "topic": "Introduction",
          "expanded": true,
          "children": [
            {"id": "objectifs", "topic": "Objectifs", "expanded": false},
            {"id": "public", "topic": "Public cible", "expanded": false}
          ]
        },
        {
          "id": "installation",
          "topic": "Installation",
          "expanded": true,
          "children": [
            {"id": "prerequis", "topic": "Prérequis", "expanded": false},
            {"id": "etapes", "topic": "Étapes d'installation", "expanded": false}
          ]
        },
        {"id": "faq", "topic": "FAQ", "expanded": false}
      ]
    }
  };

  var options = {
    container: 'jsmind_container',
    theme: 'primary',
    editable: true
  };

  var jm = new jsMind(options);
  jm.show(mind);
</script>

</body>
</html>
